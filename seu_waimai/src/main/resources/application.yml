spring:
  datasource:
    url: jdbc:mysql://localhost:3306/seu_waimai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.seu.waimai.entity

server:
  port: 8080